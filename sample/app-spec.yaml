components:
  schemas:
    uuid:
      type: string
      pattern: '^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$'
      # the regex above limits the length;
      # however, some tools might require explicit settings:
      minLength: 36
      maxLength: 36
    Api: 
      type: object 
      required: 
        - name 
        - region_name
      properties: 
        name: 
          type: string 
          maxLength: 128
          format: ^[a-zA-Z0-9][a-zA-Z0-9-\s]+[a-zA-Z0-9]$
          example: Riley 
        region_name: 
          type: string 
          example: eu-west-1
    Member: 
      type: object 
      required: 
        - roleID 
        - email 
      properties: 
        roleID:
          type: integer
          example: 100
        email : 
          type: string 
          description: email 
          example: test@firetail.io
    Orgmembers: 
      type: object 
      required: 
        - members 
      properties:
        members:
          type: array 
          items: 
            $ref: '#/components/schemas/Member'
  securitySchemes:
    jwt:
      type: http
      scheme: bearer
      bearerFormat: JWT
      x-bearerInfoFunc: app.jwt_verifier
